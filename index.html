<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store | Home</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components/navbar.css">
    <link rel="stylesheet" href="css/components/footer.css">
    <link rel="stylesheet" href="css/components/product-card.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header id="navbar-container"></header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Welcome to Our Store</h1>
                <p>Find the best products at unbeatable prices.</p>
                <a href="#products" class="btn">Shop Now</a>
            </div>
        </section>

        <section id="products" class="products-section container">
            <h2>Featured Products</h2>
            <div id="product-grid" class="product-grid">
                <!-- Products will be loaded here via JS -->
            </div>
        </section>
    </main>

    <footer id="footer-container"></footer>

    <script src="js/utils/constants.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/api/products-api.js"></script>
    <script src="js/components/navbar.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/components/product-grid.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
